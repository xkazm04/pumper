# ── Czech labor market (job postings + wage benchmarks) ──────────────────────
# A distinct domain from the grant pipelines above: reference salaries, JD
# references, and trending/fading roles for the `kp` app. Official MPSV open data
# is the backbone; commercial boards are ToS-risky and kept planned/blocked.

[[source]]
id = "mpsv-vpm"
app = "mpsv-vpm"
market = "cz"
name = "MPSV / ÚP ČR – Volná místa za celou ČR (national vacancy register)"
url = "https://data.mpsv.cz/od/soubory/volna-mista/volna-mista.json"
category = "labor-market"
engine = "http"
access = "key-free"
cadence = "daily"
cron = "0 0 6 * * *"
status = "live"
confidence = 5
dataset = "role_region_agg"
notes = "~188 MB single JSON {polozky:[]}, replaced daily, CC BY 4.0. Per posting: monthly salary min/max CZK, profeseCzIsco, employer IČO, kraj/okres/obec, public/agency flags. Parsed to a typed subset and aggregated in-memory (CZ-ISCO×kraj×orgType) → role_region_agg (+ national kraj=ALL cell) and vacancy_samples; a full per-posting upsert is avoided (upsert_many is per-row). Needs the raised [http] timeout_secs. Verified live 2026-07-05."

