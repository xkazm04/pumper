# ─────────────────────────────────────────────────────────────────────────────
# Pumper Data-Source Catalog
#
# The single source of truth for WHAT this machine scrapes and HOW. One
# `[[source]]` entry per data pipeline. Both humans and LLMs read this to assess
# the state of the data pipelines at a glance. The schema is documented in
# `catalog/README.md`; keep this file in sync with the registered apps.
#
# Every field (copy this block when adding a source):
#   id          stable kebab-case slug; == the Pumper app `name()` when 1:1
#   app         Pumper app crate serving it (crates/apps/<app>); "" if not built yet
#   market      jurisdiction id (app's scheme): us, us-ca (California), eu, au,
#               gb, cz, ca (Canada), ...  NB: us-ca = California, ca = Canada
#   name        human name of the source
#   url         primary endpoint / portal
#   category    open-calls | awarded-history | registry | labor-market
#               (labor-market = job postings + wage benchmarks; a separate domain
#                from the grant/nonprofit categories above)
#   engine      http | browser | claude | bulk        (http/browser = web, claude = llm, bulk = file download)
#   access      key-free | api-key | bulk | scrape
#   cadence     one-time | on-demand | daily | weekly | monthly | quarterly | annual
#   cron        exact 6-field expr (sec min hour dom mon dow) when on the scheduler; "" otherwise
#   status      live | planned | blocked
#   confidence  1-5  output-validity confidence (from data-source research)
#   dataset     Datasets dataset name it writes (ctx.upsert); "" if n/a
#   notes       freeform flags / gotchas
# ─────────────────────────────────────────────────────────────────────────────

