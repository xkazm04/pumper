# Pumper — local scraping service configuration.
# Every key is optional; defaults are baked into the binary (see crates/core/src/config.rs).

[server]
host = "127.0.0.1"
port = 8088

[worker]
concurrency = 4              # max jobs running at once, across all apps
job_timeout_secs = 900
poll_interval_secs = 2
default_app_concurrency = 0  # per-app cap for fairness (0 = unlimited)
schedule_tick_secs = 15      # how often the scheduler checks cron schedules
# [worker.app_concurrency]   # per-app overrides
# research = 1               # only one research (Claude) job at a time

[storage]
database_path = "data/pumper.db"
artifacts_dir = "data/artifacts"
# Revision-history retention (OFF by default — a dataset's accrued history is the
# product's value, so pruning is opt-in). When enabled, a janitor prunes
# `record_revisions` older than N days every 6h, always keeping the newest
# `revision_retention_keep_min` per record so diffs/history stay usable.
# revision_retention_days = 90
# revision_retention_keep_min = 5

[http]
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
# Total per-request timeout (the client-global default). Bulk sources that need
# longer (e.g. mpsv-vpm's ~188 MB feed) set `HttpRequest.timeout_secs` per request
# rather than degrading this global — a hung host should free its worker slot in
# ~30s, not sit for 300s.
timeout_secs = 30
retries = 3

# Per-domain politeness governor — spaces out requests to the same host.
[governor]
enabled = true
default_rps = 2.0            # requests/sec per host (0 = unlimited)
jitter_ms = 250             # random extra delay to de-sync bursts
# [governor.per_domain]     # per-host overrides
# "news.ycombinator.com" = 1.0

# Tiered fetcher (http -> browser -> claude) tuning that isn't per-request.
[fetcher]
min_content_chars = 250         # a tier whose extracted text is thinner escalates
# Host profiles (learned tier memory): strikes + the browser pin decay after
# this age, giving an aged-out host a fresh crack at the cheap HTTP tier
# (0 = never age, the old pin-forever behaviour).
host_memory_ttl_secs = 604800   # 7 days
# How often the governor's learned per-host penalties are snapshotted to the DB
# so they survive a restart (0 = in-memory only).
host_penalty_persist_secs = 60
# Session vault: named login profiles a fetch can run under (`profile` on a
# request). Each lives in <profiles_dir>/<name>/ — cookies.json (persistent HTTP
# cookie jar) + browser/ (that profile's Chrome user-data-dir), created on first
# use. Session state only: no credential management, no encryption at rest.
profiles_dir = "data/profiles"

# Content-addressed HTTP response cache with TTL.
[cache]
enabled = true
ttl_secs = 3600

[browser]
chrome_executable = 'C:\Program Files\Google\Chrome\Application\chrome.exe'
headless = true
# Persistent profile: log in to sites once (headless = false), scrape behind logins forever after.
user_data_dir = "data/browser-profile"
default_wait_ms = 1000
nav_timeout_secs = 30
# Cap on captured HTML per render (bytes); mirrors [http] max_body_bytes so a
# JS-heavy page can't balloon memory on the browser tier. Default 16 MiB; 0 = off.
# max_html_bytes = 16777216

[claude]
binary = "claude"
timeout_secs = 600
# effort = "high"            # global default reasoning effort
# max_budget_usd = 2.0       # global hard spend ceiling per run
bare = false                 # pass --bare for faster CLI startup
# Local power mode: the CLI runs with permission prompts disabled.
skip_permissions = true
allowed_tools = ["WebSearch", "WebFetch"]

# Model/effort presets apps select by name (3rd-party apps can override per job).
[claude.roles.research]
model = "claude-sonnet-5"    # latest Sonnet for research gathering
effort = "high"              # normal reasoning

[claude.roles.compose]
model = "claude-opus-4-8"    # Opus for composing research output
effort = "xhigh"             # maximum practical reasoning

# Sandboxed WASM plugin host — runs untrusted .wasm extractors with hard limits.
[plugins]
enabled = true
dir = "data/plugins"         # .wasm modules loaded at boot; hot-swap via POST /plugins/reload
fuel = 200000000            # per-call CPU instruction budget (traps runaway plugins)
max_memory_mb = 64          # hard linear-memory cap per call

# Embedded full-text search (Tantivy) — in-process, no external service.
[search]
enabled = true
dir = "data/search-index"
